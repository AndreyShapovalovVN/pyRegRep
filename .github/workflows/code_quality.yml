name: Python Code Quality

on:
  push:
    branches: [ "**" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --group dev

      # Ruff — это невероятно быстрый линтер и форматер (заменяет Flake8, Isort, Black)
      - name: Lint with Ruff
        run: uv run ruff check . --extend-exclude 'tests/~*.py'

      # Проверка типов (опционально, но крайне рекомендуется)
      - name: Type check with mypy
        run: uv run mypy . --ignore-missing-imports --pretty --show-error-codes --exclude 'tests/~.*\.py$'

      # Запуск тестів
      - name: Run tests with pytest
      run: |
          uv run pytest --maxfail=2 --disable-warnings --ignore-glob='tests/~*.py'

      # Видалення Docker імеджу після перевірки
      - name: Clean up Docker image
        if: always()
        run: |
          docker image prune -a -f
          docker system prune -f
