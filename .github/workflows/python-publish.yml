name: Publish Python package

on:
  release:
    types: [ published ]

permissions:
  contents: read
  id-token: write 

jobs:
  build:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
